name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: install macfuse (macos)
        if: runner.os == 'macOS'
        run: |
          brew install --cask macfuse
          echo "PKG_CONFIG_PATH=/usr/local/lib/pkgconfig" >> "$GITHUB_ENV"
      - run: cargo build --release --verbose
      - name: stage binary
        shell: bash
        run: |
          mkdir dist
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp target/release/fossil.exe "dist/fossil-${{ matrix.target }}.exe"
          else
            cp target/release/fossil "dist/fossil-${{ matrix.target }}"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
